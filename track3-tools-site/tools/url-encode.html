<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL编解码 - 在线URL编码解码工具 | 浏览器端处理</title>
    <meta name="description" content="免费的在线URL编解码工具，支持encodeURIComponent和decodeURIComponent，所有处理在浏览器端完成。">
    <link rel="canonical" href="https://你的域名/tools/url-encode.html">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-3">
            <a href="../index.html" class="text-blue-600 hover:underline">&larr; 返回工具列表</a>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-2">URL 编解码</h1>
        <p class="text-gray-500 mb-6">所有处理在浏览器端完成，数据不会上传到服务器 &#x1F512;</p>

        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="font-semibold text-lg mb-3">URL 编码 (encodeURIComponent)</h2>
            <textarea id="encode-input" class="w-full h-32 p-3 border rounded font-mono text-sm mb-3" placeholder="输入要编码的文本..." maxlength="102400"></textarea>
            <button onclick="doEncode()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">编码</button>
            <div id="encode-result" class="font-mono bg-gray-100 p-3 rounded text-sm mt-3 break-all"></div>
            <button onclick="copyText('encode-result')" class="mt-2 text-sm text-blue-600 hover:underline">复制结果</button>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="font-semibold text-lg mb-3">URL 解码 (decodeURIComponent)</h2>
            <textarea id="decode-input" class="w-full h-32 p-3 border rounded font-mono text-sm mb-3" placeholder="输入URL编码的字符串..." maxlength="102400"></textarea>
            <button onclick="doDecode()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">解码</button>
            <div id="decode-result" class="font-mono bg-gray-100 p-3 rounded text-sm mt-3 break-all"></div>
            <button onclick="copyText('decode-result')" class="mt-2 text-sm text-blue-600 hover:underline">复制结果</button>
        </div>
    </main>
    <script>
        var MAX_SIZE = 102400;

        function doEncode() {
            var input = document.getElementById('encode-input').value;
            var result = document.getElementById('encode-result');
            if (!input) { result.textContent = '请输入要编码的文本'; return; }
            if (input.length > MAX_SIZE) { result.textContent = '输入内容过大，请限制在100KB以内'; return; }
            try {
                result.textContent = encodeURIComponent(input);
            } catch (e) {
                result.textContent = '编码失败，请检查输入内容';
                console.error('url encode error:', e);
            }
        }

        function doDecode() {
            var input = document.getElementById('decode-input').value.trim();
            var result = document.getElementById('decode-result');
            if (!input) { result.textContent = '请输入URL编码的字符串'; return; }
            if (input.length > MAX_SIZE) { result.textContent = '输入内容过大，请限制在100KB以内'; return; }
            try {
                result.textContent = decodeURIComponent(input);
            } catch (e) {
                result.textContent = '解码失败，请确认输入为有效的URL编码字符串';
                console.error('url decode error:', e);
            }
        }

        function copyText(id) {
            var el = document.getElementById(id);
            var text = el.textContent;
            if (!text || text === '-' || text.startsWith('请输入') || text.startsWith('编码失败') || text.startsWith('解码失败') || text.startsWith('输入内容过大')) return;
            navigator.clipboard.writeText(text).then(function() {
                var orig = el.textContent;
                el.textContent = '[已复制] ' + orig;
                setTimeout(function() { el.textContent = orig; }, 1500);
            }).catch(function(e) { console.error('clipboard error:', e); });
        }
    </script>
</body>
</html>
