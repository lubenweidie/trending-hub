<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩 - 在线图片压缩工具，浏览器端处理 | 隐私安全</title>
    <meta name="description" content="免费的在线图片压缩工具，所有处理在浏览器端完成，文件不上传服务器。支持JPEG/PNG/WebP格式压缩。">
    <link rel="canonical" href="https://你的域名/tools/image-compress.html">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-3">
            <a href="../index.html" class="text-blue-600 hover:underline">&larr; 返回工具列表</a>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-2">图片压缩</h1>
        <p class="text-gray-500 mb-6">所有处理在浏览器端完成，文件不上传服务器 &#x1F512;</p>

        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="font-semibold text-lg mb-3">上传图片</h2>
            <p class="text-sm text-gray-400 mb-3">支持 JPEG / PNG / WebP，最大 10MB。不支持 SVG。</p>
            <input type="file" id="image-file" accept="image/jpeg,image/png,image/webp" class="block w-full text-sm border rounded p-2 mb-3" onchange="handleFileSelect()">
            <div id="file-error" class="text-sm text-red-600 mb-3 hidden"></div>
        </div>

        <div id="editor-section" class="hidden">
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h3 class="font-semibold text-sm text-gray-500 mb-2">原始图片</h3>
                        <img id="preview-original" class="max-w-full max-h-64 rounded border" alt="原始图片预览">
                        <p id="original-info" class="text-xs text-gray-400 mt-1"></p>
                    </div>
                    <div>
                        <h3 class="font-semibold text-sm text-gray-500 mb-2">压缩后预览</h3>
                        <img id="preview-compressed" class="max-w-full max-h-64 rounded border" alt="压缩后预览">
                        <p id="compressed-info" class="text-xs text-gray-400 mt-1"></p>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="font-semibold text-lg mb-3">压缩设置</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-gray-500">输出格式</label>
                        <select id="output-format" class="w-full border rounded p-2 text-sm mt-1" onchange="recompress()">
                            <option value="image/jpeg">JPEG（体积小，适合照片）</option>
                            <option value="image/webp">WebP（体积更小，推荐）</option>
                            <option value="image/png">PNG（无损，适合截图/图标）</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-sm text-gray-500">压缩质量: <span id="quality-label">80%</span></label>
                        <input type="range" id="quality-slider" class="w-full mt-1" min="10" max="100" value="80" oninput="onQualityChange()" onchange="recompress()">
                    </div>
                    <div>
                        <label class="text-sm text-gray-500">最大宽度 (像素，0=不缩放)</label>
                        <input type="number" id="max-width" class="w-full border rounded p-2 text-sm mt-1" value="1920" min="0" max="4096" onchange="recompress()">
                    </div>
                </div>
            </div>

            <div class="flex gap-2 mb-6">
                <button onclick="recompress()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">重新压缩</button>
                <button onclick="downloadImage()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">下载压缩图片</button>
                <button onclick="resetAll()" class="border px-4 py-2 rounded hover:bg-gray-100">重新选择</button>
            </div>
        </div>
    </main>
    <script>
        var ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/webp'];
        var MAX_SIZE = 10485760;
        var MAX_DIM = 4096;
        var originalFile = null;
        var compressedBlob = null;

        function handleFileSelect() {
            var file = document.getElementById('image-file').files[0];
            var errorDiv = document.getElementById('file-error');
            errorDiv.className = 'text-sm text-red-600 mb-3 hidden';
            errorDiv.textContent = '';

            if (!file) return;

            if (ALLOWED_TYPES.indexOf(file.type) === -1) {
                if (file.type === 'image/svg+xml') {
                    showError('不支持SVG格式，请使用JPEG/PNG/WebP');
                } else {
                    showError('不支持的文件格式 [' + file.type + ']，请使用JPEG/PNG/WebP');
                }
                return;
            }
            if (file.size > MAX_SIZE) {
                showError('文件过大（' + formatSize(file.size) + '），请限制在10MB以内');
                return;
            }

            originalFile = file;
            document.getElementById('original-info').textContent = '大小: ' + formatSize(file.size) + ' | 类型: ' + file.type;
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    if (img.width > MAX_DIM || img.height > MAX_DIM) {
                        showError('图片尺寸过大（' + img.width + 'x' + img.height + '），最大支持4096px');
                        return;
                    }
                    document.getElementById('preview-original').src = e.target.result;
                    document.getElementById('original-info').textContent = '大小: ' + formatSize(file.size) + ' | 尺寸: ' + img.width + 'x' + img.height + ' | 类型: ' + file.type;
                    document.getElementById('editor-section').className = '';
                    compress(img);
                };
                img.onerror = function() {
                    showError('图片加载失败，文件可能已损坏');
                };
                img.src = e.target.result;
            };
            reader.onerror = function() {
                showError('文件读取失败');
            };
            reader.readAsDataURL(file);
        }

        function showError(msg) {
            var errorDiv = document.getElementById('file-error');
            errorDiv.textContent = msg;
            errorDiv.className = 'text-sm text-red-600 mb-3';
            document.getElementById('editor-section').className = 'hidden';
            document.getElementById('image-file').value = '';
        }

        function compress(img, callback) {
            var format = document.getElementById('output-format').value;
            var quality = parseInt(document.getElementById('quality-slider').value) / 100;
            var maxW = parseInt(document.getElementById('max-width').value) || 0;

            var w = img.width, h = img.height;
            if (maxW > 0 && w > maxW) {
                h = Math.round(h * (maxW / w));
                w = maxW;
            }

            var canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);

            if (format === 'image/png') {
                canvas.toBlob(function(blob) {
                    compressedBlob = blob;
                    showCompressedResult(blob);
                    if (callback) callback();
                }, 'image/png');
            } else {
                canvas.toBlob(function(blob) {
                    compressedBlob = blob;
                    showCompressedResult(blob);
                    if (callback) callback();
                }, format, quality);
            }
        }

        function showCompressedResult(blob) {
            var url = URL.createObjectURL(blob);
            document.getElementById('preview-compressed').src = url;
            var reduction = '';
            if (originalFile) {
                var pct = Math.round((1 - blob.size / originalFile.size) * 100);
                if (pct > 0) {
                    reduction = ' | 减小 ' + pct + '%';
                }
            }
            document.getElementById('compressed-info').textContent = '大小: ' + formatSize(blob.size) + reduction;
        }

        function recompress() {
            if (!originalFile) return;
            var img = new Image();
            img.onload = function() { compress(img); };
            img.src = document.getElementById('preview-original').src;
        }

        function onQualityChange() {
            document.getElementById('quality-label').textContent = document.getElementById('quality-slider').value + '%';
        }

        function downloadImage() {
            if (!compressedBlob) return;
            var url = URL.createObjectURL(compressedBlob);
            var a = document.createElement('a');
            var ext = document.getElementById('output-format').value.split('/')[1];
            if (ext === 'jpeg') ext = 'jpg';
            a.href = url;
            a.download = 'compressed.' + ext;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
        }

        function resetAll() {
            document.getElementById('image-file').value = '';
            document.getElementById('editor-section').className = 'hidden';
            document.getElementById('file-error').className = 'text-sm text-red-600 mb-3 hidden';
            originalFile = null;
            compressedBlob = null;
            document.getElementById('preview-original').src = '';
            document.getElementById('preview-compressed').src = '';
            document.getElementById('quality-slider').value = 80;
            document.getElementById('quality-label').textContent = '80%';
            document.getElementById('max-width').value = 1920;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(2) + ' MB';
        }
    </script>
</body>
</html>
