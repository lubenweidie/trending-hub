name: Trending Content Pipeline

on:
  schedule:
    # 每4小时（UTC），对应北京时间 4/8/12/16/20/24点，共6次/天
    - cron: '0 20,0,4,8,12,16 * * *'
  workflow_dispatch:

concurrency:
  group: trending-pipeline
  cancel-in-progress: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests jinja2 beautifulsoup4

      - name: Run pipeline
        working-directory: track2-content-pipeline
        run: python pipeline.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deploy to GitHub Pages
        if: success()
        run: |
          cp track2-content-pipeline/output/index.html /tmp/index.html
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf --cached . 2>/dev/null || true
          rm -rf ./* 2>/dev/null || true
          cp /tmp/index.html .
          git config user.name "TrendBot"
          git config user.email "bot@trends.local"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes, skip commit"
          else
            git commit -m "Update: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M BJT')"
            git push origin gh-pages --force
          fi
